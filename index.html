<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Ayaaaa 💗</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lora:ital,wght@1,600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050505; color: #ff85a2; font-family: 'Quicksand', sans-serif;
            overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* Latar Belakang & Animasi */
        .bg-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .particle { position: absolute; background: rgba(255, 133, 162, 0.5); border-radius: 50%; animation: twinkle 3s infinite; }
        .floating-heart { position: absolute; font-size: 20px; color: #ff85a2; animation: floatUp 8s infinite linear; opacity: 0.6; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }
        @keyframes twinkle { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }

        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; position: relative; }

        /* Sistem Slide Utama */
        .slide { display: none !important; animation: fadeIn 1s ease-in-out; width: 100%; }
        .slide.active { display: block !important; }

        .card { background: rgba(15, 15, 15, 0.9); padding: 30px 20px; border-radius: 20px; border: 2px solid #ff85a2; box-shadow: 0 0 20px rgba(255, 133, 162, 0.2); margin: 0 auto; }
        h2 { font-size: 18px; color: white; margin-bottom: 25px; line-height: 1.4; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        button { background: #ff85a2; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 15px; width: 80%; max-width: 250px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .moving-btn { position: relative; transition: all 0.2s ease; }

        /* Sesi 2: Teks Lora */
        .script-text { font-family: 'Lora', serif; font-style: italic; font-size: 38px; color: white; line-height: 1.4; }

        /* Sesi 3: Galeri Swipe & Tombol Desktop */
        .ref-card { background: white; color: #000; padding: 25px; border-radius: 25px; position: relative; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); min-height: 120px; display: flex; align-items: center; justify-content: center; }
        .ref-link { position: absolute; top: 10px; right: 15px; font-size: 10px; color: rgba(0,0,0,0.4); }
        .ref-text { font-family: 'Dancing Script', cursive; font-size: 22px; font-weight: bold; line-height: 1.4; transition: opacity 0.3s; }
        
        .swipe-hint { font-size: 12px; color: #ff85a2; margin-bottom: 10px; animation: twinkle 2s infinite; }

        .poto-slider { display: flex; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 15px; scrollbar-width: none; scroll-behavior: smooth; }
        .poto-slider::-webkit-scrollbar { display: none; } 
        .slide-item { flex: 0 0 100%; scroll-snap-align: center; display: flex; justify-content: center; gap: 10px; }
        .img-box { width: 48%; border-radius: 12px; overflow: hidden; border: 2px solid #ff85a2; box-shadow: 0 4px 10px rgba(255,133,162,0.3); }
        .img-box img { width: 100%; height: auto; display: block; object-fit: cover; aspect-ratio: 3/4; }

        /* Tombol Navigasi Desktop */
        .nav-desktop { display: flex; justify-content: center; gap: 20px; margin-top: 5px; margin-bottom: 15px; }
        .nav-desktop button { width: auto; padding: 8px 15px; background: transparent; border: 2px solid #ff85a2; color: #ff85a2; font-size: 18px; border-radius: 10px; }
        .nav-desktop button:hover { background: rgba(255, 133, 162, 0.2); }

        .finish-btn { margin-top: 10px; display: none; width: 100%; max-width: 300px; margin-left: auto; margin-right: auto; } 

        /* Sesi 4: Jantung Foto */
        .final-jantung { position: relative; width: 100%; height: 350px; margin: 30px 0; display: flex; justify-content: center; align-items: center; }
        .hati-neon { font-size: 250px; color: #ff85a2; text-shadow: 0 0 40px #ff85a2; opacity: 0.6; pointer-events: none; }
        .bingkai-kecil { position: absolute; width: 50px; height: 50px; object-fit: cover; border: 2px solid #fff; border-radius: 8px; box-shadow: 0 0 10px #ff85a2; }

        /* Popup */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; display: none; justify-content: center; align-items: center; }
        .popup-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #ff85a2; text-align: center; width: 80%; max-width: 300px; animation: fadeIn 0.3s; box-shadow: 0 0 20px rgba(255,133,162,0.5); }
        .popup-box p { font-size: 18px; margin-bottom: 20px; color: white; line-height: 1.5; }
        .popup-box button { width: 100%; }
        .overlay-start { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay-start">
        <button onclick="mulaiAja()">Mulai Kejutan 💗</button>
    </div>

    <div class="bg-elements" id="bg-elements"></div>

    <div id="custom-popup" class="popup-overlay">
        <div class="popup-box">
            <p id="popup-text">Pesan di sini</p>
            <button onclick="tutupPopup()">OK</button>
        </div>
    </div>

    <div class="container">
        <div id="s1" class="slide active">
            <div id="quiz-tahap1" class="card">
                <h2>SIAAPAAA PACALLL PAPOLITT DEDEE??? 🤨</h2>
                <div class="btn-group">
                    <button onclick="pilihBlondong()">1. si blondong🤬</button>
                    <button id="btn-mupni" class="moving-btn" onmouseover="kaburMupni()" onclick="pilihMupni()">2. mupniii bulidd😋</button>
                </div>
            </div>
            <div id="quiz-tahap2" class="card" style="display: none;">
                <h2>CAPEEE UNGGAA PILIHH AA? 🥹</h2>
                <div class="btn-group">
                    <button onclick="pilihCapee()">2. capee 😩</button>
                    <button onclick="pilihUnggaa()">1. unggaaa 💖</button>
                </div>
            </div>
        </div>

        <div id="s2" class="slide">
            <div class="card" style="padding: 60px 20px;">
                <p class="script-text">Happy Birthday<br>Maa Lovvv 💗</p>
            </div>
        </div>

        <div id="s3" class="slide">
            <div class="ref-card">
                <span class="ref-link">madeforyaa.vercel.app</span>
                <p id="teks-galeri" class="ref-text">Teks bagian 1...</p>
            </div>

            <p class="swipe-hint">👈 Geser foto pakai jari / klik tombol 👉</p>

            <div id="slider-foto" class="poto-slider">
                <div class="slide-item" data-index="0">
                    <div class="img-box"><img src="poto1.jpg" alt="Foto 1"></div>
                    <div class="img-box"><img src="poto2.jpg" alt="Foto 2"></div>
                </div>
                <div class="slide-item" data-index="1">
                    <div class="img-box"><img src="poto3.jpg" alt="Foto 3"></div>
                    <div class="img-box"><img src="poto4.jpg" alt="Foto 4"></div>
                </div>
                <div class="slide-item" data-index="2">
                    <div class="img-box"><img src="poto5.jpg" alt="Foto 5"></div>
                    <div class="img-box"><img src="poto6.jpg" alt="Foto 6"></div>
                </div>
            </div>

            <div class="nav-desktop">
                <button onclick="geserGaleri(-1)">⬅️</button>
                <button onclick="geserGaleri(1)">➡️</button>
            </div>

            <button id="btn-finish" class="finish-btn" onclick="gantiSlideUtama(4)">Lihat Kejutan Terakhir ✨</button>
        </div>

        <div id="s4" class="slide">
            <h2>HBD Sayangku! 🎂✨</h2>
            <div class="final-jantung">
                <div class="hati-neon">💗</div>
                <img src="poto_jantung1.jpeg" class="bingkai-kecil" style="top:10%; left:30%;">
                <img src="poto_jantung2.jpg" class="bingkai-kecil" style="top:10%; right:30%;">
                <img src="poto_jantung3.jpeg" class="bingkai-kecil" style="top:30%; left:10%;">
                <img src="poto_jantung4.jpg" class="bingkai-kecil" style="top:30%; right:10%;">
                <img src="poto_jantung5.jpg" class="bingkai-kecil" style="top:55%; left:20%;">
                <img src="poto_jantung6.jpg" class="bingkai-kecil" style="top:55%; right:20%;">
                <img src="poto_jantung7.jpg" class="bingkai-kecil" style="top:75%; left:40%;">
                <img src="poto_jantung8.jpg" class="bingkai-kecil" style="top:75%; right:40%;">
                <img src="poto_jantung9.jpg" class="bingkai-kecil" style="top:90%; left:50%; transform: translateX(-50%);">
            </div>
            <video controls style="width: 100%; border-radius: 15px; border: 2px solid #ff85a2;">
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>

    </div>

    <audio id="musik" src="musik.mp3" loop></audio>

    <script>
        const teksBagian = [
            "happyy birthdayyy pacalllll aa, semogaaa sehatt selaluuu panjang umullllllll dannn selaluuuu dikelilingiiii kebahaagiann yaawwwwww,",
            "semogaaaa ugaaaaa nantiiiii biluuuuu pastiiii biluuuu aa pelcayaaa ituuu, dedeee kann hebatttttt pintalllllllll maaciiwwww udaaaa belusahaaaa sampeee saattt iniiiiii,",
            "maaciiii yaawwww udaaaa memiliihhh aa maafff aa masiiii banyakkk kulanggnyaaaa, wishh u all the bestttt pacallllllll💗💗💗💗💗"
        ];
        
        let mupniGeser = 0;
        let callbackPopup = null;

        // Background Effects
        for (let i = 0; i < 30; i++) {
            let partikel = document.createElement('div');
            partikel.className = 'particle';
            partikel.style.width = Math.random() * 4 + 2 + 'px';
            partikel.style.height = partikel.style.width;
            partikel.style.left = Math.random() * 100 + 'vw';
            partikel.style.top = Math.random() * 100 + 'vh';
            partikel.style.animationDelay = Math.random() * 3 + 's';
            document.getElementById('bg-elements').appendChild(partikel);
        }
        setInterval(() => {
            let hati = document.createElement('div');
            hati.className = 'floating-heart';
            hati.innerHTML = '💗';
            hati.style.left = Math.random() * 100 + 'vw';
            document.getElementById('bg-elements').appendChild(hati);
            setTimeout(() => hati.remove(), 8000);
        }, 1200);

        function mulaiAja() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('musik').play();
            document.getElementById('teks-galeri').innerText = teksBagian[0]; 
        }

        function gantiSlideUtama(n) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('s' + n).classList.add('active');
            
            if(n === 2) {
                setTimeout(() => { gantiSlideUtama(3); }, 3000);
            }
        }

        function bukaPopup(pesan, aksiSelanjutnya) {
            document.getElementById('popup-text').innerHTML = pesan;
            document.getElementById('custom-popup').style.display = 'flex';
            callbackPopup = aksiSelanjutnya;
        }

        function tutupPopup() {
            document.getElementById('custom-popup').style.display = 'none';
            if(callbackPopup) callbackPopup();
        }

        // Logic Kuis
        function kaburMupni() {
            if (mupniGeser < 5) {
                const btn = document.getElementById('btn-mupni');
                btn.style.position = 'absolute';
                btn.style.left = Math.random() * 60 + 10 + '%';
                btn.style.top = Math.random() * 60 + 10 + '%';
                mupniGeser++;
            }
        }

        function pilihMupni() {
            if (mupniGeser < 5) {
                kaburMupni();
            } else {
                bukaPopup("capeee unggaaa pilihh aa? 🥹", () => {
                    document.getElementById('quiz-tahap1').style.display = 'none';
                    document.getElementById('quiz-tahap2').style.display = 'block';
                });
            }
        }

        function pilihBlondong() {
            const emotNangis = ['😭😭😭', '😢😢😢', '😭🥺', '😭😭😭😭😭'];
            const randomEmot = emotNangis[Math.floor(Math.random() * emotNangis.length)];
            bukaPopup(randomEmot + "<br><br>Kok pilih dia?! Coba lagi! 😭", resetKuis);
        }

        function pilihCapee() { bukaPopup("maaffinn aa...... 😔", resetKuis); }
        function pilihUnggaa() { bukaPopup("maaciii yaaaa🥹💖", () => { gantiSlideUtama(2); }); }

        function resetKuis() {
            mupniGeser = 0;
            const btn = document.getElementById('btn-mupni');
            btn.style.position = 'relative'; btn.style.left = '0'; btn.style.top = '0';
            document.getElementById('quiz-tahap1').style.display = 'block';
            document.getElementById('quiz-tahap2').style.display = 'none';
        }

        // Fungsi Klik Tombol Kiri Kanan untuk Laptop
        function geserGaleri(arah) {
            const slider = document.getElementById('slider-foto');
            const lebarSatuSlide = slider.clientWidth; // Lebar 1 pasang foto
            slider.scrollBy({ left: arah * lebarSatuSlide, behavior: 'smooth' });
        }

        // Deteksi Otomatis Saat Foto Digeser (Touchscreen / Tombol)
        const observerOptions = {
            root: document.getElementById('slider-foto'),
            rootMargin: '0px',
            threshold: 0.6 
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const indeks = parseInt(entry.target.getAttribute('data-index'));
                    const teksElemen = document.getElementById('teks-galeri');
                    teksElemen.style.opacity = '0';
                    setTimeout(() => {
                        teksElemen.innerText = teksBagian[indeks];
                        teksElemen.style.opacity = '1';
                    }, 300);

                    // Tampilkan tombol finish kalau udah di slide terakhir
                    if (indeks === 2) {
                        document.getElementById('btn-finish').style.display = 'block';
                    } else {
                        document.getElementById('btn-finish').style.display = 'none';
                    }
                }
            });
        }, observerOptions);

        document.querySelectorAll('.slide-item').forEach((item) => {
            observer.observe(item);
        });

    </script>
</body>
</html>
